name: Release

# 推 v* tag (例: v1.0.0) 触发 Windows x64 打包并发布到 GitHub Releases.
# 也可以在 Actions 页面手动触发 (workflow_dispatch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # 拉全历史 + 全 tag, 后面 generate-notes 要用上一个 tag 做对比基准.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      # 用 GitHub 的 generate-release-notes API, 自动按 PR 标题列出本版改动 +
      # "Full Changelog" 链接. 不需要手写, 也不会再像之前把 "首次安装步骤"
      # 当成 changelog 给老用户看.
      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(gh api -X POST \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name='${{ github.ref_name }}' \
            --jq .body)
          {
            echo 'body<<RANPU_NOTES_EOF'
            echo "$NOTES"
            echo 'RANPU_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Build + bundle + publish to Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tauri-plugin-updater 签名: tauri signer generate 出 .key + .pub,
          # private key 内容贴进 GitHub repo secret TAURI_SIGNING_PRIVATE_KEY,
          # 生成时设的密码贴进 TAURI_SIGNING_PRIVATE_KEY_PASSWORD,
          # public key 写到 src-tauri/tauri.conf.json plugins.updater.pubkey.
          # tauri-action 会自动产 latest.json + .sig 并上传到 Release.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '染谱 Ranpu ${{ github.ref_name }}'
          # 把自动生成的 changelog 灌进去 (会同时进 Release 页面和 latest.json).
          # 首次安装步骤迁去 README, 这里只放 "本版改了什么".
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
