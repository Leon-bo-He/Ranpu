name: Release

# 推 v* tag (例: v1.0.0) 触发 Windows x64 打包并发布到 Gitee Releases.
# GitHub Actions 仍负责跑构建 (Gitee Go 不提供免费 Windows runner),
# 产出 .exe + .sig 之后通过 Gitee Open API 上传到 Gitee Release,
# 同时把 latest.json 推到 release-meta 分支供 tauri-updater 读取.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GITEE_OWNER: Leon-bo-He
  GITEE_REPO: Ranpu

jobs:
  build-windows-x64:
    runs-on: windows-latest
    # generate-release-notes 这一步需要 GITHUB_TOKEN 有 contents: write,
    # 即使我们不再把产物推 GitHub Releases.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # 拉全历史 + 全 tag, 后面 generate-notes 要用上一个 tag 做对比基准.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      # 用 GitHub 的 generate-release-notes API, 自动按 PR 标题列出本版改动 +
      # "Full Changelog" 链接. 不需要手写, 也不会再像之前把 "首次安装步骤"
      # 当成 changelog 给老用户看.
      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(gh api -X POST \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name='${{ github.ref_name }}' \
            --jq .body)
          {
            echo 'body<<RANPU_NOTES_EOF'
            echo "$NOTES"
            echo 'RANPU_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      # tauri-plugin-updater 签名: tauri signer generate 出 .key + .pub,
      # private key 内容贴进 GitHub repo secret TAURI_SIGNING_PRIVATE_KEY,
      # 生成时设的密码贴进 TAURI_SIGNING_PRIVATE_KEY_PASSWORD,
      # public key 写到 src-tauri/tauri.conf.json plugins.updater.pubkey.
      # createUpdaterArtifacts: true 让 tauri build 自动生成 .exe.sig.
      - name: Build Tauri (Windows x64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --target x86_64-pc-windows-msvc

      - name: Locate artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR=src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis
          EXE=$(ls "$BUNDLE_DIR"/*-setup.exe | head -n 1)
          SIG="${EXE}.sig"
          [ -f "$EXE" ] || { echo "missing exe: $EXE"; exit 1; }
          [ -f "$SIG" ] || { echo "missing sig: $SIG"; exit 1; }
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          EXE_NAME=$(basename "$EXE")
          {
            echo "exe=$EXE"
            echo "sig=$SIG"
            echo "exe_name=$EXE_NAME"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Create Gitee Release + upload exe / sig
        id: gitee_release
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.body }}
          EXE: ${{ steps.artifacts.outputs.exe }}
          SIG: ${{ steps.artifacts.outputs.sig }}
        run: |
          set -euo pipefail
          jq -n \
            --arg tok "$GITEE_TOKEN" \
            --arg tag "$TAG" \
            --arg name "染谱 Ranpu $TAG" \
            --arg body "$NOTES" \
            '{access_token: $tok, tag_name: $tag, name: $name, body: $body, target_commitish: "release-meta", prerelease: false}' \
            > /tmp/release.json

          RESP=$(curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -d @/tmp/release.json \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases")
          REL_ID=$(echo "$RESP" | jq -r .id)
          if [ -z "$REL_ID" ] || [ "$REL_ID" = "null" ]; then
            echo "Failed to create Gitee release: $RESP"
            exit 1
          fi
          echo "Gitee release id: $REL_ID"

          curl -fsSL -X POST \
            -F "access_token=${GITEE_TOKEN}" \
            -F "file=@${EXE}" \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${REL_ID}/attach_files"

          curl -fsSL -X POST \
            -F "access_token=${GITEE_TOKEN}" \
            -F "file=@${SIG}" \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${REL_ID}/attach_files"

          echo "release_id=$REL_ID" >> "$GITHUB_OUTPUT"

      - name: Build latest.json (updater manifest)
        id: manifest
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.artifacts.outputs.version }}
          EXE_NAME: ${{ steps.artifacts.outputs.exe_name }}
          SIG: ${{ steps.artifacts.outputs.sig }}
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          set -euo pipefail
          SIG_CONTENT=$(cat "$SIG")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}/releases/download/${TAG}/${EXE_NAME}"
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIG_CONTENT" \
            --arg url "$DOWNLOAD_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json
          cat latest.json

      - name: Attach latest.json to Gitee Release
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          REL_ID: ${{ steps.gitee_release.outputs.release_id }}
        run: |
          curl -fsSL -X POST \
            -F "access_token=${GITEE_TOKEN}" \
            -F "file=@latest.json" \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${REL_ID}/attach_files"

      # tauri-plugin-updater 需要一个稳定 URL 拉 latest.json (不能挂 tag 上,
      # 客户端无从知道 "最新 tag 是哪个"). 把它放到 release-meta 分支根目录,
      # updater 通过 https://gitee.com/{owner}/{repo}/raw/release-meta/latest.json 拉.
      #
      # 之前用 Gitee Contents API 走 GET → POST/PUT 的 upsert 路线, 但 Gitee 在
      # 文件不存在时会返回 branch 对象而不是标准 404, 让 jq 解析炸掉. 直接 git
      # clone + push 反而最稳, 用 token-in-URL, GitHub Actions 会自动 mask 日志.
      - name: Upsert latest.json on release-meta branch (Gitee)
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          REPO_URL="https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"
          LATEST_JSON="$PWD/latest.json"
          TMPDIR=$(mktemp -d)

          # 浅克隆 default 分支当起点. 现在 Gitee 的默认分支就是 release-meta,
          # 所以多数情况 clone 之后已经在 release-meta 上, 不用再 fetch.
          # 兜底: 万一默认分支改回 main 之类的, 显式 fetch + checkout.
          git clone --depth 1 "$REPO_URL" "$TMPDIR"
          CURRENT=$(git -C "$TMPDIR" branch --show-current)
          if [ "$CURRENT" != "release-meta" ]; then
            if git -C "$TMPDIR" fetch --depth 1 origin release-meta:release-meta 2>/dev/null; then
              git -C "$TMPDIR" checkout release-meta
            else
              # 远端没 release-meta, 直接以当前 default 分支为起点新建
              git -C "$TMPDIR" checkout -b release-meta
            fi
          fi

          cp "$LATEST_JSON" "$TMPDIR/latest.json"
          git -C "$TMPDIR" add latest.json

          if git -C "$TMPDIR" diff --cached --quiet; then
            echo "release-meta latest.json unchanged, skipping push"
            exit 0
          fi

          git -C "$TMPDIR" \
            -c user.email=ci@ranpu \
            -c user.name="Ranpu CI" \
            commit -m "release: ${TAG}"
          git -C "$TMPDIR" push origin release-meta

      # 镜像一份到 GitHub Releases, 海外用户 / 冗余备份用. tauri-updater
      # 仍只看 Gitee, 这里只是把同一份产物挂到 GitHub Release 页面.
      # softprops/action-gh-release@v2 用 GITHUB_TOKEN, 不需要额外 secret.
      - name: Mirror to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 染谱 Ranpu ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.exe }}
            ${{ steps.artifacts.outputs.sig }}
            latest.json
